<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Start Page</title>
    <style>
      :root { color-scheme: light; --mobile-bottom-space: 62px; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #eef3ff;
        color: #14213d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body::before, body::after {
        content: ""; position: fixed; z-index: -1; width: min(62vw, 720px); aspect-ratio: 1;
        border-radius: 50%; filter: blur(2px); opacity: .72;
      }
      body::before { top: -30vw; left: -16vw; background: #bed4ff; }
      body::after { right: -19vw; bottom: -36vw; background: #c5f1e7; }
      main { width: min(680px, calc(100% - 40px)); transform: translateY(-4vh); }
      .eyebrow { margin: 0 0 14px; color: #62708b; text-align: center; font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 0; text-align: center; font-size: clamp(36px, 5vw, 54px); font-weight: 760; line-height: 1.04; letter-spacing: -.065em; }
      .subtitle { margin: 13px 0 30px; text-align: center; color: #62708b; font-size: 16px; }
      .mobile-copy { display: none; }
      .searches { display: grid; gap: 14px; }
      .search-card { position: relative; }
      .search-icon { position: absolute; top: 50%; left: 22px; width: 21px; height: 21px; color: #7e8ba2; pointer-events: none; transform: translateY(-50%); }
      .service { position: absolute; top: 50%; right: 19px; display: flex; align-items: center; gap: 8px; color: #52627c; font-size: 14px; font-weight: 760; pointer-events: none; transform: translateY(-50%); }
      .service svg { width: 19px; height: 19px; }
      textarea {
        width: 100%; min-height: 72px; height: 72px; padding: 23px 142px 18px 58px; border: 1px solid rgba(211, 220, 237, .95); border-radius: 22px;
        background: rgba(255, 255, 255, .9); color: inherit; font: inherit; font-size: 18px; outline: none;
        box-shadow: 0 20px 45px rgba(55, 80, 130, .13), 0 2px 4px rgba(55, 80, 130, .05); backdrop-filter: blur(12px);
        line-height: 1.35; resize: none; overflow: hidden; transition: border-color .18s, box-shadow .18s, transform .18s, height .14s ease;
      }
      textarea::placeholder { color: #97a2b6; }
      textarea:focus { border-color: #8aa8ed; box-shadow: 0 0 0 5px rgba(103, 142, 231, .15), 0 24px 48px rgba(55, 80, 130, .15); transform: translateY(-1px); }
      #chatgpt-query { background: rgba(20, 33, 61, .97); border-color: #14213d; color: white; box-shadow: 0 20px 45px rgba(20, 33, 61, .2), 0 2px 4px rgba(20, 33, 61, .08); }
      #chatgpt-query::placeholder { color: #aeb9cd; }
      #chatgpt-query:focus { border-color: #7998d6; box-shadow: 0 0 0 5px rgba(103, 142, 231, .17), 0 24px 48px rgba(20, 33, 61, .27); }
      #chatgpt-card .search-icon, #chatgpt-card .service { color: #d8e0ef; }
      .key { display: inline-grid; place-items: center; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 6px; background: rgba(104, 119, 148, .15); color: #70809a; font-size: 11px; font-weight: 800; }
      #chatgpt-card .key { background: rgba(255,255,255,.13); color: #d8e0ef; }
      #note { min-height: 20px; margin: 16px 0 0; text-align: center; color: #62708b; font-size: 13px; }
      @media (max-width: 480px) {
        body { align-items: end; padding: 0 0 max(var(--mobile-bottom-space), env(safe-area-inset-bottom)); }
        main { width: min(100% - 32px, 680px); transform: none; }
        .eyebrow { margin-bottom: 10px; }
        h1 { font-size: 38px; }
        .subtitle { margin: 10px 0 22px; font-size: 15px; }
        .desktop-copy { display: none; }
        .mobile-copy { display: inline; }
        #chatgpt-card { display: none; }
        textarea { min-height: 66px; height: 66px; padding: 20px 58px 16px 58px; }
        .service { display: flex; right: 20px; gap: 0; font-size: 0; }
        .service svg { width: 20px; height: 20px; }
        .service .key { display: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Your calm corner of the web</p>
      <h1>Where to next?</h1>
      <p class="subtitle"><span class="desktop-copy">Choose a box and write freely. It grows with you.</span><span class="mobile-copy">Search the web instantly.</span></p>
      <div class="searches">
        <div class="search-card">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4.2 4.2"/></svg>
          <textarea id="google-query" rows="1" autocomplete="off" placeholder="Search Google" aria-label="Search Google" autofocus></textarea>
          <span class="service"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M21.7 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.4a4.6 4.6 0 0 1-2 3v2.5h3.2c1.9-1.8 3.1-4.4 3.1-7.3Z"/><path fill="#34A853" d="M12 22c2.7 0 5-.9 6.7-2.5l-3.2-2.5c-.9.6-2 .9-3.5.9-2.7 0-5-1.8-5.8-4.3H2.9V16A10 10 0 0 0 12 22Z"/><path fill="#FBBC05" d="M6.2 13.6A6 6 0 0 1 5.9 12c0-.6.1-1.1.3-1.6V7.9H2.9A10 10 0 0 0 2 12c0 1.5.4 2.8.9 4.1l3.3-2.5Z"/><path fill="#EA4335" d="M12 6.1c1.6 0 3 .5 4.1 1.6l3-3A10 10 0 0 0 2.9 7.9l3.3 2.5C7 7.9 9.3 6.1 12 6.1Z"/></svg>Google <span class="key">↵</span></span>
        </div>
        <div class="search-card" id="chatgpt-card">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4.2 4.2"/></svg>
          <textarea id="chatgpt-query" rows="1" autocomplete="off" placeholder="Ask ChatGPT" aria-label="Ask ChatGPT"></textarea>
          <span class="service"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.2a4.7 4.7 0 0 1 7.5 5.3 4.7 4.7 0 0 1-2.2 8.5 4.7 4.7 0 0 1-7.5 3.1 4.7 4.7 0 0 1-5.3-7.5 4.7 4.7 0 0 1 2.2-8.5A4.7 4.7 0 0 1 12 3.2Z"/><path d="M8.5 8.2 15.7 12l-7.2 3.8M12 4.2V12"/></svg>ChatGPT <span class="key">↵</span></span>
        </div>
      </div>
      <p id="note" aria-live="polite"></p>
    </main>
    <script>
      const googleQuery = document.querySelector('#google-query');
      const chatgptQuery = document.querySelector('#chatgpt-query');
      const note = document.querySelector('#note');
      const accountForBrowserBar = () => {
        const viewport = window.visualViewport;
        if (!viewport) return;
        const browserBar = Math.max(0, window.innerHeight - viewport.height - viewport.offsetTop);
        document.documentElement.style.setProperty('--mobile-bottom-space', `${Math.max(62, browserBar + 62)}px`);
      };
      accountForBrowserBar();
      window.visualViewport?.addEventListener('resize', accountForBrowserBar);
      const autoGrow = input => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 260) + 'px';
      };
      const bindSearch = (input, navigate) => {
        autoGrow(input);
        input.addEventListener('input', () => autoGrow(input));
        input.addEventListener('keydown', event => {
          if (event.key !== 'Enter' || event.shiftKey) return;
          event.preventDefault();
          const value = input.value.trim();
          if (!value) return input.focus();
          navigate(value);
        });
      };
      bindSearch(googleQuery, value => location.assign('https://www.google.com/search?q=' + encodeURIComponent(value)));
      bindSearch(chatgptQuery, value => location.assign('https://chatgpt.com/?q=' + encodeURIComponent(value)));
    </script>
  </body>
</html>
